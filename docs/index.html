<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Botiran — Flash Info Karukera</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 800px; /* au lieu de 520px */
      width: 100%;
      text-align: center;
    }

    .artwork {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      object-fit: cover;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.95rem;
      color: #8b8fa8;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #252836;
      border: 1px solid #333646;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: #e8e8e8;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 0.75rem;
    }

    .btn:hover {
      background: #2e3245;
      border-color: #4a4f6a;
    }

    .btn-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .btn-text { text-align: left; }
    .btn-label { display: block; color: #fff; }
    .btn-sub { display: block; font-size: 0.8rem; color: #8b8fa8; margin-top: 2px; }

    .btn-arrow {
      margin-left: auto;
      color: #555;
      font-size: 0.9rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2d3a;
      margin: 1.5rem 0;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #555;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .rss-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: #f26522;
      font-size: 0.82rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    .rss-link:hover { opacity: 0.75; }

    .rss-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .apple-embed {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 0.75rem;
      display: block;
    }

    .yt-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      margin-bottom: 0.75rem;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .yt-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 12px;
    }

    .badge {
      display: inline-block;
      background: #1e3a2f;
      color: #4ade80;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="artwork.jpg" alt="Botiran" class="artwork">
    <h1>Botiran</h1>
    <p class="tagline">Flash info et horoscope de la Guadeloupe<br>Matin, midi et soir — par Botiran</p>

    <iframe
      class="apple-embed"
      src="https://embed.podcasts.apple.com/fr/podcast/lactualit%C3%A9-de-la-guadeloupe/id1894299367"
      height="450"
      frameborder="0"
      sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
      allow="autoplay *; encrypted-media *; clipboard-write"
      title="Apple Podcasts — L'actualité de la Guadeloupe">
    </iframe>

    <a href="https://www.youtube.com/playlist?list=PLwzi3ZXU6pu-M_41dNvTNOXTtz14uv8Rn" class="btn" target="_blank" rel="noopener">
      <span class="btn-icon">📻</span>
      <span class="btn-text">
        <span class="btn-label">Radio Karukera</span>
        <span class="btn-sub">Playlist musicale mise à jour chaque jour</span>
      </span>
      <span class="btn-arrow">›</span>
    </a>
    
    <a href="https://t.me/botiran_news_971" class="btn" target="_blank" rel="noopener">
      <span class="btn-icon">✈️</span>
      <span class="btn-text">
        <span class="btn-label">Telegram</span>
        <span class="btn-sub">Vidéos et audios en direct</span>
      </span>
      <span class="btn-arrow">›</span>
    </a>

  </div>
  <div class="footer">
    <a href="podcast.xml" class="rss-link">
      <svg class="rss-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3a1 1 0 0 0 0 2c8.837 0 16 7.163 16 16a1 1 0 1 0 2 0C21 11.058 12.942 3 3 3zm0 6a1 1 0 0 0 0 2c5.514 0 10 4.486 10 10a1 1 0 1 0 2 0c0-6.617-5.383-12-12-12zm1 9a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
      </svg>
      Flux RSS Podcast <span class="badge">LIVE</span>
    </a>
    <span>© Botiran — Karukera</span>
  </div>
</body>
</html>

name: Flash Info Guadeloupe

on:
  schedule:
    # Édition matin  — 4h30 Paris hiver (UTC+1) = 3h30 UTC / 5h30 Paris été (UTC+2)
    - cron: "30 3 * * *"
    # Édition midi   — 12h Paris (11h UTC hiver / 10h UTC été)
    - cron: "0 11 * * *"
    # Édition soir   — 19h Paris (20h UTC hiver / 19h UTC été)
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date (YYYY-MM-DD) — laisser vide pour aujourd'hui"
        required: false
        default: ""
      edition:
        description: "Édition (matin / midi / soir) — auto-détection si vide"
        type: choice
        options: ["", "matin", "midi", "soir"]
        required: false
        default: ""
      dry_run:
        description: "Dry-run (génère + Telegram, pas Buzzsprout/X)"
        type: boolean
        required: false
        default: false
      tiktok:
        description: "Génère les vidéos TikTok/Shorts et les envoie sur Telegram"
        type: boolean
        required: false
        default: true
      youtube:
        description: "Publie les vidéos sur YouTube Shorts (hors intro/outro)"
        type: boolean
        required: false
        default: false
      linkedin:
        description: "Publie la vidéo complète sur LinkedIn (intro + 5 hashtags aléatoires)"
        type: boolean
        required: false
        default: false
      instagram:
        description: "Publie la vidéo complète en Reel Instagram (intro + 5 hashtags aléatoires)"
        type: boolean
        required: false
        default: false
      no_thumbnail:
        description: "Désactive la génération et l'embed du thumbnail"
        type: boolean
        required: false
        default: false
      horoscope_signs:
        description: "Nombre de signes astrologiques dans la rubrique horoscope (défaut : 3)"
        type: integer
        required: false
        default: 3
      horoscope_include:
        description: "Forcer un ou plusieurs signes (noms anglais séparés par des espaces, ex: gemini capricorn taurus)"
        required: false
        default: ""
      generate_horoscope:
        description: "Génère uniquement le segment horoscope (sans flash complet) — passer 'only'"
        type: choice
        options: ["", "only"]
        required: false
        default: ""
      verbose:
        description: "Verbose (affiche le détail de chaque étape)"
        type: boolean
        required: false
        default: true

jobs:
  flash-info:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configurer les credentials git pour le submodule privé
        run: git config --global url."https://${{ secrets.PAT_SUBMODULE }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_SUBMODULE }}
          submodules: true

      - name: Installer FFmpeg et polices emoji
        run: sudo apt-get install -y ffmpeg fonts-noto-color-emoji

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Préparer les arguments
        id: args
        run: |
          ARGS=""
          IS_SCHEDULE="${{ github.event_name == 'schedule' }}"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.edition }}" ]; then
            ARGS="$ARGS --edition ${{ github.event.inputs.edition }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          TIKTOK_INPUT="${{ github.event.inputs.tiktok }}"
          if [ "$IS_SCHEDULE" = "true" ] || [ "$TIKTOK_INPUT" = "true" ] || [ -z "$TIKTOK_INPUT" ]; then
            ARGS="$ARGS --tiktok"
          fi
          if [ "${{ github.event.inputs.youtube }}" = "true" ]; then
            ARGS="$ARGS --youtube"
          fi
          if [ "${{ github.event.inputs.linkedin }}" = "true" ]; then
            ARGS="$ARGS --linkedin"
          fi
          if [ "${{ github.event.inputs.instagram }}" = "true" ]; then
            ARGS="$ARGS --instagram"
          fi
          if [ "${{ github.event.inputs.no_thumbnail }}" = "true" ]; then
            ARGS="$ARGS --no-thumbnail"
          fi
          HOROSCOPE_SIGNS="${{ github.event.inputs.horoscope_signs }}"
          if [ -n "$HOROSCOPE_SIGNS" ] && [ "$HOROSCOPE_SIGNS" != "3" ]; then
            ARGS="$ARGS --horoscope-signs $HOROSCOPE_SIGNS"
          fi
          HOROSCOPE_INCLUDE="${{ github.event.inputs.horoscope_include }}"
          if [ -n "$HOROSCOPE_INCLUDE" ]; then
            ARGS="$ARGS --horoscope-include $HOROSCOPE_INCLUDE"
          fi
          GENERATE_HOROSCOPE="${{ github.event.inputs.generate_horoscope }}"
          if [ "$GENERATE_HOROSCOPE" = "only" ]; then
            ARGS="$ARGS --generate-horoscope only"
          fi
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          echo "FLASH_ARGS=$ARGS" >> $GITHUB_ENV
          echo "Arguments : $ARGS"

      - name: Générer le flash info
        env:
          MISTRAL_API_KEY:          ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          BUZZSPROUT_API_TOKEN:     ${{ secrets.BUZZSPROUT_API_TOKEN }}
          BUZZSPROUT_PODCAST_ID:    ${{ secrets.BUZZSPROUT_PODCAST_ID }}
          X_API_KEY:                ${{ secrets.X_API_KEY }}
          X_API_SECRET:             ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:           ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:    ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          YOUTUBE_CLIENT_ID:        ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:    ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:    ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          LINKEDIN_ACCESS_TOKEN:    ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN:   ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID:       ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET:   ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_PERSON_ID:       ${{ secrets.LINKEDIN_PERSON_ID }}
          INSTAGRAM_ACCESS_TOKEN:   ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:        ${{ secrets.INSTAGRAM_USER_ID }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          B2_KEY_ID:                ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY:       ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET_NAME:           ${{ secrets.B2_BUCKET_NAME }}
          B2_ENDPOINT:              ${{ secrets.B2_ENDPOINT }}
          ARCHIVE_ACCESS_KEY:            ${{ secrets.ARCHIVE_ACCESS_KEY }}
          ARCHIVE_SECRET_KEY:            ${{ secrets.ARCHIVE_SECRET_KEY }}
        run: python -u flash-info-gwada.py ${{ env.FLASH_ARGS }}

      - name: Sauvegarder l'anti-répétition et les archives
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions [Flash Info]"
          git add data/used_articles_*.json archives/flash-info/
          git diff --cached --quiet || git commit -m "chore: flash info $(date +%Y-%m-%d) — archive + anti-répétition [skip ci]"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: flash info $(date +%Y-%m-%d) — RSS"
          git push || true

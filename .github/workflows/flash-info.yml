name: Flash Info Guadeloupe

on:
  schedule:
    # 7h00 heure Guadeloupe (UTC-4) = 11h00 UTC, du lundi au vendredi
    - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Date (YYYY-MM-DD) — laisser vide pour aujourd'hui"
        required: false
        default: ""
      dry_run:
        description: "Dry-run (génère + Telegram, pas Buzzsprout/X)"
        type: boolean
        required: false
        default: false

jobs:
  flash-info:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Lancer le flash info
        env:
          MISTRAL_API_KEY:          ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          BUZZSPROUT_API_TOKEN:     ${{ secrets.BUZZSPROUT_API_TOKEN }}
          BUZZSPROUT_PODCAST_ID:    ${{ secrets.BUZZSPROUT_PODCAST_ID }}
          X_API_KEY:                ${{ secrets.X_API_KEY }}
          X_API_SECRET:             ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:           ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:    ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python flash-info-gwada.py $ARGS

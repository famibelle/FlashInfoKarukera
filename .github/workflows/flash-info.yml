name: Flash Info Guadeloupe

on:
  schedule:
    # 7h00 heure Guadeloupe (UTC-4) = 11h00 UTC, tous les jours
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date (YYYY-MM-DD) — laisser vide pour aujourd'hui"
        required: false
        default: ""
      dry_run:
        description: "Dry-run (génère + Telegram, pas Buzzsprout/X)"
        type: boolean
        required: false
        default: false
      tiktok:
        description: "Génère les vidéos TikTok/Shorts et les envoie sur Telegram"
        type: boolean
        required: false
        default: true
      youtube:
        description: "Publie les vidéos sur YouTube Shorts (hors intro/outro)"
        type: boolean
        required: false
        default: false
      verbose:
        description: "Verbose (affiche le détail de chaque étape)"
        type: boolean
        required: false
        default: false

jobs:
  flash-info:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer FFmpeg et polices emoji
        run: sudo apt-get install -y ffmpeg fonts-noto-color-emoji

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Lancer le flash info
        env:
          MISTRAL_API_KEY:          ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          BUZZSPROUT_API_TOKEN:     ${{ secrets.BUZZSPROUT_API_TOKEN }}
          BUZZSPROUT_PODCAST_ID:    ${{ secrets.BUZZSPROUT_PODCAST_ID }}
          X_API_KEY:                ${{ secrets.X_API_KEY }}
          X_API_SECRET:             ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:           ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:    ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          YOUTUBE_CLIENT_ID:        ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:    ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:    ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          ARGS=""
          # Déclenchement cron : tiktok activé par défaut
          IS_SCHEDULE="${{ github.event_name == 'schedule' }}"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          # tiktok activé par défaut (cron, workflow_dispatch sans paramètre, ou paramètre explicite)
          TIKTOK_INPUT="${{ github.event.inputs.tiktok }}"
          if [ "$IS_SCHEDULE" = "true" ] || [ "$TIKTOK_INPUT" = "true" ] || [ -z "$TIKTOK_INPUT" ]; then
            ARGS="$ARGS --tiktok"
          fi
          if [ "${{ github.event.inputs.youtube }}" = "true" ]; then
            ARGS="$ARGS --youtube"
          fi
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          python flash-info-gwada.py $ARGS

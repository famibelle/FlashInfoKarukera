name: GitHub Pages

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (sans submodule)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Uploader docs/
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4

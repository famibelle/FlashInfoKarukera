name: 🎶 YouTube Music Radio Playlist Update

on:
  workflow_run:
    workflows:
      - "Horoscope Quotidien"
      - "Flash Info Guadeloupe"
    types: [completed]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    name: Generate & Update Radio Playlist
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎬 Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: 🔑 Write YouTube Music auth file
        run: echo '${{ secrets.YTMUSIC_BROWSER_JSON_B64 }}' | base64 -d > browser.json

      - name: 🔑 Write YouTube Data API token
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json

      - name: 📻 Mise à jour playlist 24h
        env:
          YTMUSIC_PLAYLIST_24H_ID: ${{ secrets.YTMUSIC_PLAYLIST_24H_ID }}
          YOUTUBE_TOKEN_PATH: youtube_token.json
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python playlist_24h.py

      - name: 💾 Commit caches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlists/youtube_cache.json playlists/music_pool_cache.json playlists/playlist_24h_id.txt playlists/youtube_playlist_id.txt
          git diff --cached --quiet || git commit -m "chore: update playlists cache [skip ci]"
          git pull --rebase origin main
          git push

      - name: ✅ Playlist Update Success
        if: success()
        run: echo "✅ Playlists mises à jour à $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: ❌ Playlist Update Failed
        if: failure()
        run: |
          echo "❌ Mise à jour échouée — voir les logs"
          exit 1

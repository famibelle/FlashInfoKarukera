name: 🎶 YouTube Music Radio Playlist Update

on:
  workflow_run:
    workflows:
      - "Horoscope Quotidien"
      - "Flash Info Guadeloupe"
    types: [completed]

  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - name: Vérifier que horoscope ET flash info ont réussi récemment
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          NOW=$(date -u +%s)
          WINDOW=10800  # 3 heures

          last_success() {
            gh api "repos/$REPO/actions/runs?per_page=10" \
              --jq ".workflow_runs[] | select(.name == \"$1\" and .conclusion == \"success\") | .updated_at" \
              | head -1
          }

          HORO_AT=$(last_success "Horoscope Quotidien")
          FLASH_AT=$(last_success "Flash Info Guadeloupe")

          HORO_TS=$(date -d "${HORO_AT:-1970-01-01}" +%s 2>/dev/null || echo 0)
          FLASH_TS=$(date -d "${FLASH_AT:-1970-01-01}" +%s 2>/dev/null || echo 0)

          HORO_AGE=$((NOW - HORO_TS))
          FLASH_AGE=$((NOW - FLASH_TS))

          echo "Horoscope : ${HORO_AT} (age ${HORO_AGE}s)"
          echo "Flash info : ${FLASH_AT} (age ${FLASH_AGE}s)"

          if [ "$HORO_AGE" -lt "$WINDOW" ] && [ "$FLASH_AGE" -lt "$WINDOW" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "⏭️  Les deux workflows n'ont pas encore terminé — mise à jour ignorée."
          fi

  update-playlist:
    needs: gate
    if: ${{ needs.gate.outputs.ok == 'true' }}
    runs-on: ubuntu-latest
    name: Generate & Update Radio Playlist

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎬 Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: 🔑 Write YouTube Music auth file
        run: echo '${{ secrets.YTMUSIC_BROWSER_JSON_B64 }}' | base64 -d > browser.json

      - name: 🔑 Write YouTube Data API token
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json

      - name: 📻 Mise à jour playlist 24h
        env:
          YTMUSIC_PLAYLIST_24H_ID: ${{ secrets.YTMUSIC_PLAYLIST_24H_ID }}
          YOUTUBE_TOKEN_PATH: youtube_token.json
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python playlist_24h.py

      - name: 💾 Commit caches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlists/youtube_cache.json playlists/music_pool_cache.json playlists/playlist_24h_id.txt playlists/youtube_playlist_id.txt
          git diff --cached --quiet || git commit -m "chore: update playlists cache [skip ci]"
          git pull --rebase origin main
          git push

      - name: ✅ Playlist Update Success
        if: success()
        run: echo "✅ Playlists mises à jour à $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: ❌ Playlist Update Failed
        if: failure()
        run: |
          echo "❌ Mise à jour échouée — voir les logs"
          exit 1

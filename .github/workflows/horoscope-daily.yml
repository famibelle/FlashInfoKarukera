name: Horoscope Quotidien

on:
  schedule:
    # Matin : 5h Paris hiver (UTC+1) = 4h UTC / 6h Paris été (UTC+2)
    - cron: "0 4 * * *"
    # Soir  : 18h Paris hiver (UTC+1) = 17h UTC / 19h Paris été (UTC+2)
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      edition:
        description: "Édition : matin ou soir"
        type: choice
        options:
          - matin
          - soir
        required: false
        default: matin
      date:
        description: "Date (YYYY-MM-DD) — laisser vide pour aujourd'hui"
        required: false
        default: ""
      horoscope_signs:
        description: "Nombre de signes (défaut : 7)"
        type: integer
        required: false
        default: 3
      horoscope_include:
        description: "Forcer un ou plusieurs signes (noms anglais séparés par des espaces, ex: gemini capricorn)"
        required: false
        default: ""
      tiktok:
        description: "Génère les vidéos TikTok/Shorts et les envoie sur Telegram"
        type: boolean
        required: false
        default: true
      verbose:
        description: "Verbose (affiche le détail de chaque étape)"
        type: boolean
        required: false
        default: true

jobs:
  horoscope:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer FFmpeg et polices emoji
        run: sudo apt-get install -y ffmpeg fonts-noto-color-emoji

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Générer l'horoscope du jour
        env:
          MISTRAL_API_KEY:          ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          BUZZSPROUT_API_TOKEN:     ${{ secrets.BUZZSPROUT_API_TOKEN }}
          BUZZSPROUT_PODCAST_ID:    ${{ secrets.BUZZSPROUT_PODCAST_ID }}
          R2_ACCOUNT_ID:            ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:           ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # Déterminer l'édition : schedule → heure UTC, workflow_dispatch → input
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt 12 ]; then
              EDITION="matin"
            else
              EDITION="soir"
            fi
          else
            EDITION="${{ github.event.inputs.edition }}"
            EDITION="${EDITION:-matin}"
          fi

          echo "📅 Édition : $EDITION"
          ARGS="--edition $EDITION"

          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi

          HOROSCOPE_SIGNS="${{ github.event.inputs.horoscope_signs }}"
          HOROSCOPE_SIGNS="${HOROSCOPE_SIGNS:-7}"
          ARGS="$ARGS --horoscope-signs $HOROSCOPE_SIGNS"

          HOROSCOPE_INCLUDE="${{ github.event.inputs.horoscope_include }}"
          if [ -n "$HOROSCOPE_INCLUDE" ]; then
            ARGS="$ARGS --horoscope-include $HOROSCOPE_INCLUDE"
          fi

          TIKTOK_INPUT="${{ github.event.inputs.tiktok }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$TIKTOK_INPUT" = "true" ] || [ -z "$TIKTOK_INPUT" ]; then
            ARGS="$ARGS --tiktok"
          fi

          ARGS="$ARGS --telegram"

          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi

          python horoscope-gwada.py $ARGS

      - name: Sauvegarder l'anti-répétition flore et les archives
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions [Horoscope]"
          git add data/used_flora.json archives/horoscope/
          git diff --cached --quiet || git commit -m "chore: horoscope $(date +%Y-%m-%d) — archive + flore [skip ci]"
          git push || true
